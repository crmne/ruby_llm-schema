name: Main CI

on:
  push:
    branches: ["main"]
    paths:
      - "lib/**"
      - "spec/**"
      - "Gemfile"
      - "Gemfile.lock"
      - "Rakefile"
      - "ruby_llm-schema.gemspec"
      - ".gitleaks.toml"
      - ".gitleaksignore"
      - ".rubocop.yml"
      - ".github/workflows/_gitleaks.yml"
      - ".github/workflows/_lint.yml"
      - ".github/workflows/_test-matrix.yml"
      - ".github/workflows/main.yml"
      - ".github/workflows/release.yml"
      - "lib/ruby_llm/schema/version.rb"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    uses: ./.github/workflows/_gitleaks.yml

  lint:
    uses: ./.github/workflows/_lint.yml
    with:
      ruby-version: "4.0"
      bundler-cache: true

  test:
    needs: [gitleaks, lint]
    uses: ./.github/workflows/_test-matrix.yml
    with:
      bundler-cache: true
    secrets: inherit

  release_needed:
    name: Release Gate
    needs: [test]
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check_version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"

      - name: Check if version needs publishing
        id: check_version
        run: |
          set -euo pipefail
          VERSION=$(ruby -Ilib -rruby_llm/schema/version -e "puts RubyLLM::Schema::VERSION" 2>/dev/null)

          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract VERSION from lib/ruby_llm/schema/version.rb" >&2
            exit 1
          fi
          echo "Local version: $VERSION"

          GEM_NAME="ruby_llm-schema"
          ALL_PUBLISHED_VERSIONS=$(( \
            gem list ^${GEM_NAME}$ -r --all 2>/dev/null || true; \
            gem list ^${GEM_NAME}$ -r --prerelease 2>/dev/null || true; \
          ) | sed -n 's/.*(\(.*\)).*/\1/p' \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep . \
            | sort -u )

          if echo "$ALL_PUBLISHED_VERSIONS" | grep -Fxq "$VERSION"; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            version_changed=false
          else
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            version_changed=true
          fi

          TAG="v${VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            tag_missing=false
          else
            tag_missing=true
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            release_missing=false
          else
            release_missing=true
          fi

          if [ "$version_changed" = "true" ] || [ "$tag_missing" = "true" ] || [ "$release_missing" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: needs.release_needed.outputs.should_release == 'true'
    needs: [release_needed]
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
      packages: write
    secrets: inherit
