name: PR

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    uses: ./.github/workflows/_gitleaks.yml

  lint:
    name: RuboCop
    uses: ./.github/workflows/_lint.yml
    with:
      ruby-version: "4.0"
      bundler-cache: false

  test:
    uses: ./.github/workflows/_test-matrix.yml
    with:
      bundler-cache: false
    secrets: inherit
