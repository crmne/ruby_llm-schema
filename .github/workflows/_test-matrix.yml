name: _Test Matrix

on:
  workflow_call:
    inputs:
      bundler-cache:
        description: Enable Bundler cache
        required: false
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.ruby-version }})
    runs-on: ubuntu-latest
    env:
      BUNDLE_PATH: vendor/bundle
      BUNDLE_DISABLE_SHARED_GEMS: "true"
    strategy:
      matrix:
        ruby-version: ["3.1", "3.2", "3.3", "3.4", "4.0", "jruby-10.0.2.0"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: ${{ inputs.bundler-cache }}

      - name: Install dependencies
        run: bundle install

      - name: Run load guard
        run: bundle exec ruby -e "require 'ruby_llm/schema'"

      - name: Run tests
        if: matrix.ruby-version != '4.0'
        run: bundle exec rspec
        env:
          SKIP_COVERAGE: true

      - name: Run tests with coverage
        if: matrix.ruby-version == '4.0'
        run: bundle exec rspec

      - name: Upload coverage
        if: matrix.ruby-version == '4.0'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: crmne/ruby_llm-schema
          fail_ci_if_error: false
